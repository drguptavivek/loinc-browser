name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build tagged binaries
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Run checks
        run: |
          npm --prefix web run build
          go test ./...
          npm --prefix web run check

      - name: Build release packages
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          VERSION="${VERSION#v}" ./scripts/build-release.sh

      - name: Upload release packages artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-packages
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  smoke-linux:
    name: Smoke Linux amd64 binary
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: dist

      - name: Run Linux binary smoke test
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -xzf "dist/loinc-browser_${VERSION}_linux_amd64.tar.gz" -C dist
          cd "dist/loinc-browser_${VERSION}_linux_amd64"
          ./loinc-browser -v
          set +e
          timeout 5 ./loinc-browser --port 19011 --no-mcp
          status=$?
          set -e
          test "$status" -eq 124

  smoke-windows:
    name: Smoke Windows amd64 binary
    runs-on: windows-latest
    needs: build

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: dist

      - name: Run Windows binary smoke test
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          Expand-Archive -Path "dist/loinc-browser_${version}_windows_amd64.zip" -DestinationPath dist
          Set-Location "dist/loinc-browser_${version}_windows_amd64"
          .\loinc-browser.exe -v
          $workDir = (Get-Location).Path
          $job = Start-Job -ScriptBlock {
            Set-Location $using:workDir
            .\loinc-browser.exe --port 19012 --no-mcp
          }
          try {
            Start-Sleep -Seconds 3
            Invoke-RestMethod -Uri http://localhost:19012/api/version | ConvertTo-Json -Compress
          } finally {
            Stop-Job $job -ErrorAction SilentlyContinue
            Remove-Job $job -Force -ErrorAction SilentlyContinue
          }

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - smoke-linux
      - smoke-windows

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          name: release-packages
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
